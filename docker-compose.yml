version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erlchat_postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-chat_dev}
      POSTGRES_USER:     ${DB_USER:-chatuser}
      POSTGRES_PASSWORD: ${DB_PASS:-chatpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chatuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [chat_net]

  # ── Redis (optional — for multi-node PubSub) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: erlchat_redis
    command: redis-server --requirepass ${REDIS_PASS:-redispass} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [chat_net]

  # ── Phoenix Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erlchat_backend
    environment:
      DATABASE_URL:    "ecto://${DB_USER:-chatuser}:${DB_PASS:-chatpass}@postgres/${DB_NAME:-chat_dev}"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET:      ${JWT_SECRET}
      PHX_HOST:        ${PHX_HOST:-localhost}
      PORT:            8080
      REDIS_URL:       "redis://:${REDIS_PASS:-redispass}@redis:6379"
      POOL_SIZE:       20
      STORAGE_TYPE:    ${STORAGE_TYPE:-local}
      STORAGE_PATH:    /app/priv/uploads
      BASE_URL:        ${BASE_URL:-http://localhost:8080}
      # AWS S3 (optional)
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:            ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET:-erlchat-uploads}
    volumes:
      - uploads:/app/priv/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [chat_net]
    restart: unless-stopped
    # Run migrations automatically on startup
    command: >
      sh -c "/app/bin/chat eval 'Chat.Release.migrate()' && /app/bin/chat start"

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/socket}
    container_name: erlchat_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks: [chat_net]
    restart: unless-stopped

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: erlchat_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads:/var/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks: [chat_net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  chat_net:
    driver: bridge

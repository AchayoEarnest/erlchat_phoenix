worker_processes auto;
events { worker_connections 4096; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=ws:10m;

    upstream backend  { server backend:8080;  keepalive 64; }
    upstream frontend { server frontend:3000; keepalive 16; }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options           DENY        always;
        add_header X-Content-Type-Options    nosniff     always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        client_max_body_size 55M;

        # ── Phoenix WebSocket (/socket) ─────────────────────────
        # Phoenix uses /socket/websocket — different from raw /ws
        location /socket {
            limit_conn ws 20;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Phoenix LiveDashboard ────────────────────────────────
        location /dashboard {
            # Restrict to internal IPs in production
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass       http://backend;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Auth endpoints (strict rate limit) ──────────────────
        location ~ ^/auth/(login|register) {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── REST API ─────────────────────────────────────────────
        location ~ ^/(auth|users|rooms|messages|files|threads|admin|health) {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Local file uploads ───────────────────────────────────
        location /uploads/ {
            alias   /var/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Next.js frontend ─────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            expires    1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}

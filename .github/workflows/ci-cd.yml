name: ErlChat Phoenix CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:         ghcr.io
  IMAGE_BACKEND:    ${{ github.repository }}/erlchat-phoenix-backend
  IMAGE_FRONTEND:   ${{ github.repository }}/erlchat-phoenix-frontend
  MIX_ENV:          test

jobs:
  # ── Backend Tests ─────────────────────────────────────────────
  test-backend:
    name: Elixir Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       chat_test
          POSTGRES_USER:     chatuser
          POSTGRES_PASSWORD: chatpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version:   '26'
          elixir-version: '1.16'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('backend/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install deps
        working-directory: backend
        run: mix deps.get

      - name: Compile (warnings as errors)
        working-directory: backend
        run: mix compile --warnings-as-errors

      - name: Check formatting
        working-directory: backend
        run: mix format --check-formatted

      - name: Credo static analysis
        working-directory: backend
        run: mix credo --strict
        continue-on-error: true

      - name: Create & migrate test DB
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_USER: chatuser
          DB_PASS: chatpass
          DB_NAME: chat_test
          JWT_SECRET: ci_test_jwt_secret_minimum_32_chars!!
        run: mix ecto.setup

      - name: Run tests with coverage
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_USER: chatuser
          DB_PASS: chatpass
          DB_NAME: chat_test
          JWT_SECRET: ci_test_jwt_secret_minimum_32_chars!!
        run: mix coveralls.github
        continue-on-error: true

      - name: Dialyzer type check
        working-directory: backend
        run: mix dialyzer
        continue-on-error: true

  # ── Frontend Tests ────────────────────────────────────────────
  test-frontend:
    name: Next.js Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL:  ws://localhost:8080/socket
        run: npm run build

  # ── Docker Build & Push ───────────────────────────────────────
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/erlchat
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed ${{ github.sha }}"
